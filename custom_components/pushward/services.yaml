update_activity:
  name: Update Activity
  description: Update a PushWard Live Activity state and content.
  fields:
    slug:
      name: Slug
      description: Activity slug identifier.
      required: true
      example: "ha-washer"
      selector:
        text:
    state:
      name: State
      description: Activity state.
      required: true
      selector:
        select:
          options:
            - "ONGOING"
            - "ENDED"
    template:
      name: Template
      description: "Required. Activity layout template. For steps: also provide total_steps and current_step. For alert: also provide severity. For gauge: also provide min_value and max_value. For countdown: also provide end_date."
      required: true
      example: "generic"
      selector:
        select:
          options:
            - "generic"
            - "countdown"
            - "steps"
            - "alert"
            - "gauge"
            - "timeline"
    progress:
      name: Progress
      description: Progress value between 0.0 and 1.0.
      example: 0.5
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.01
          mode: slider
    state_text:
      name: State Text
      description: Text shown as the activity state.
      example: "Downloading"
      selector:
        text:
    icon:
      name: Icon
      description: SF Symbol or MDI icon name (e.g. arrow.down.circle.fill, mdi:download).
      example: "arrow.down.circle.fill"
      selector:
        text:
    subtitle:
      name: Subtitle
      description: Subtitle text shown on the activity.
      example: "episode-01.mkv"
      selector:
        text:
    accent_color:
      name: Accent Color
      description: Accent color name for the activity.
      example: "blue"
      selector:
        text:
    remaining_time:
      name: Remaining Time
      description: Remaining time in seconds.
      example: 120
      selector:
        number:
          min: 0
          mode: box
    url:
      name: URL
      description: Primary URL displayed as a tappable button. Only supported on steps and alert templates.
      example: "https://example.com"
      selector:
        text:
    secondary_url:
      name: Secondary URL
      description: Secondary URL displayed as a second tappable button. Only supported on steps and alert templates.
      example: "https://example.com/details"
      selector:
        text:
    end_date:
      name: End Date
      description: Unix timestamp for countdown end date.
      example: 1700000000
      selector:
        number:
          min: 0
          mode: box
    total_steps:
      name: Total Steps
      description: Total number of steps.
      example: 5
      selector:
        number:
          min: 1
          mode: box
    current_step:
      name: Current Step
      description: Current step number.
      example: 2
      selector:
        number:
          min: 0
          mode: box
    severity:
      name: Severity
      description: Alert severity level.
      example: "warning"
      selector:
        select:
          options:
            - "critical"
            - "warning"
            - "info"
    completion_message:
      name: Completion Message
      description: Message shown when the activity ends.
      example: "Download complete!"
      selector:
        text:
    value:
      name: Value
      description: "Gauge: numeric value. Timeline: labeled values object (e.g. Temp=22.5)."
      example: 22.5
      selector:
        object:
    min_value:
      name: Min Value
      description: Minimum gauge value.
      example: 0
      selector:
        number:
          step: 0.1
          mode: box
    max_value:
      name: Max Value
      description: Maximum gauge value.
      example: 100
      selector:
        number:
          step: 0.1
          mode: box
    unit:
      name: Unit
      description: Display unit for the value (e.g. °C, %).
      example: "\u00b0C"
      selector:
        text:
    scale:
      name: Scale
      description: Y-axis scale mode (linear or logarithmic). Timeline template only.
      example: "linear"
      selector:
        select:
          options:
            - "linear"
            - "logarithmic"
    decimals:
      name: Decimal Places
      description: Decimal places for value display (0-10). Timeline template only.
      example: 1
      selector:
        number:
          min: 0
          max: 10
          mode: box
    smoothing:
      name: Smooth Lines
      description: Enable curve interpolation between data points. Timeline template only.
      selector:
        boolean:
    thresholds:
      name: Thresholds
      description: Horizontal reference lines on the sparkline. Timeline template only.
      selector:
        object:
    sound:
      name: Sound
      description: Override the notification sound for this update.
      example: "chime"
      selector:
        select:
          options:
            - "default"
            - "chime"
            - "alert"
            - "success"
            - "warning"
            - "bell"
            - "ding"
            - "buzz"
            - "notification"
    priority:
      name: Priority Override
      description: Override activity priority for this update (0 = lowest, 10 = highest).
      example: 5
      selector:
        number:
          min: 0
          max: 10
          mode: slider
    background_color:
      name: Background Color
      description: Background color as a hex value (e.g. #1a2b3c) or named color (e.g. blue).
      example: "#1a2b3c"
      selector:
        text:
    text_color:
      name: Text Color
      description: Text color as a hex value (e.g. #ffffff) or named color (e.g. white).
      example: "#ffffff"
      selector:
        text:
    warning_threshold:
      name: Warning Threshold
      description: Seconds remaining at which the countdown enters warning state. Countdown template only.
      example: 30
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
    alarm:
      name: Alarm
      description: Trigger a device alarm when the countdown expires. Countdown template only (iOS 26+).
      selector:
        boolean:
    step_labels:
      name: Step Labels
      description: Labels for each step as a YAML object keyed by step number (e.g. {"1":"Step 1","2":"Step 2"}). Steps template only.
      selector:
        object:
    step_rows:
      name: Step Rows
      description: Row heights for each step as a list of integers (1–10). Steps template only.
      selector:
        object:
    fired_at:
      name: Fired At
      description: Unix timestamp when the alert was triggered. Alert template only.
      example: 1700000000
      selector:
        number:
          min: 0
          mode: box
    units:
      name: Units
      description: Per-series unit labels as a YAML object (e.g. {"temp":"°C","humidity":"%"}). Timeline template only.
      selector:
        object:

create_activity:
  name: Create Activity
  description: Create a new PushWard Live Activity.
  fields:
    slug:
      name: Slug
      description: Unique activity slug identifier.
      required: true
      example: "ha-washer"
      selector:
        text:
    name:
      name: Name
      description: Display name for the activity.
      required: true
      example: "Washing Machine"
      selector:
        text:
    priority:
      name: Priority
      description: Activity priority (0 = lowest, 10 = highest).
      default: 1
      example: 1
      selector:
        number:
          min: 0
          max: 10
          mode: slider
    ended_ttl:
      name: Ended TTL
      description: Seconds to keep the activity after it ends. Leave empty to keep indefinitely.
      example: 300
      selector:
        number:
          min: 1
          max: 2592000
          mode: box
    stale_ttl:
      name: Stale TTL
      description: Seconds before the activity is considered stale. Leave empty to disable.
      example: 1800
      selector:
        number:
          min: 1
          max: 2592000
          mode: box

end_activity:
  name: End Activity
  description: End a PushWard Live Activity.
  fields:
    slug:
      name: Slug
      description: Activity slug identifier to end.
      required: true
      example: "ha-washer"
      selector:
        text:
    completion_message:
      name: Completion Message
      description: Optional message shown when the activity ends.
      example: "Washing complete!"
      selector:
        text:

delete_activity:
  name: Delete Activity
  description: Delete a PushWard Live Activity.
  fields:
    slug:
      name: Slug
      description: Activity slug identifier to delete.
      required: true
      example: "ha-washer"
      selector:
        text:

send_notification:
  name: Send Notification
  description: Send a push notification via PushWard.
  fields:
    title:
      name: Title
      description: Notification title.
      required: true
      example: "Door Opened"
      selector:
        text:
    body:
      name: Body
      description: Notification body text.
      required: true
      example: "The front door was opened."
      selector:
        text:
          multiline: true
    subtitle:
      name: Subtitle
      description: Optional subtitle shown below the title.
      example: "Living Room"
      selector:
        text:
    # TODO(critical-alerts): re-add "critical" option and the volume field below once Apple approves entitlement
    level:
      name: Level
      description: iOS interruption level. Controls how the notification is delivered.
      example: "active"
      selector:
        select:
          options:
            - "passive"
            - "active"
            - "time-sensitive"
    thread_id:
      name: Thread ID
      description: Groups notifications together in Notification Center.
      example: "home-security"
      selector:
        text:
    collapse_id:
      name: Collapse ID
      description: APNs deduplication key. Replaces previous notification with the same key. Max 64 characters.
      example: "door-alert"
      selector:
        text:
    category:
      name: Category
      description: Notification category for custom actions.
      example: "SECURITY"
      selector:
        text:
    source:
      name: Source
      description: Source identifier for grouping in the PushWard inbox.
      example: "home-assistant"
      selector:
        text:
    source_display_name:
      name: Source Display Name
      description: Human-readable source name shown in the PushWard inbox.
      example: "Home Assistant"
      selector:
        text:
    activity_slug:
      name: Activity Slug
      description: Link this notification to an existing Live Activity.
      example: "ha-washer"
      selector:
        text:
    url:
      name: URL
      description: Primary deep-link URL opened when the notification is tapped.
      example: "https://example.com"
      selector:
        text:
    image_url:
      name: Image URL
      description: URL of an image to attach to the notification.
      example: "https://example.com/image.png"
      selector:
        text:
    icon_url:
      name: Icon URL
      description: URL of a custom icon to display with the notification.
      example: "https://example.com/icon.png"
      selector:
        text:
    metadata:
      name: Metadata
      description: Arbitrary key-value pairs attached to the notification for custom app handling.
      selector:
        object:
    push:
      name: Push
      description: Send as an APNs push alert to all devices. When false, the notification is stored in the inbox only.
      default: true
      selector:
        boolean:
