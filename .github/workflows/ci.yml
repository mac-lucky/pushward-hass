name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  hacs-validate:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: astral-sh/ruff-action@v3
        with:
          args: check custom_components/ tests/
          version: latest
      - uses: astral-sh/ruff-action@v3
        with:
          args: format custom_components/ tests/
          version: latest
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v --cov=custom_components/pushward --cov-report=term-missing

  release:
    name: Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [hacs-validate, hassfest, lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n#{{UNCATEGORIZED}}",
              "categories": [
                { "title": "### Features",      "labels": ["feat"] },
                { "title": "### Bug Fixes",     "labels": ["fix"] },
                { "title": "### Refactoring",   "labels": ["refactor"] },
                { "title": "### Documentation", "labels": ["docs"] },
                { "title": "### CI/CD",         "labels": ["ci"] },
                { "title": "### Chores",        "labels": ["chore", "style", "perf", "test", "build"] }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|refactor|docs|ci|chore|perf|style|test|build)(\\(.+\\))?(!)?: .+",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "$CHANGELOG"
